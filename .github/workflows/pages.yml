name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  # ለወደፊቱ Pull Request ስታደርግ ቼክ እንዲያደርግልህ
  pull_request:
    branches: ['main']
  # በራሳችን ፍላጎት ከ Actions ታብ ላይ ለማንቀሳቀስ (Manual trigger)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # index.html ያለበት ፎልደር ሩት (root) ላይ መሆኑን ያረጋግጣል
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        # ወደ v4 ማሳደግ የ 404 ስህተቱን ይቀርፈዋል
        uses: actions/deploy-pages@v4