        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');

        function displayResults(results) {
            resultsDiv.innerHTML = '';
            if (results.length === 0) {
                resultsDiv.innerHTML = '<p class="text-center text-gray-500">No results found</p>';
                return;
            }
            results.forEach(item => {
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-lg shadow-md';
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-lg font-semibold text-blue-600">${item.code}</h3>
                            <p class="text-gray-700 mt-1">${item.description}</p>
                        </div>
                        <button class="text-blue-500 hover:text-blue-700 ml-4" onclick="copyToClipboard('${item.code}')">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                            </svg>
                        </button>
                    </div>
                `;
                resultsDiv.appendChild(div);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Code copied to clipboard!');
            });
        }

        function search(query) {
            if (!query) {
                displayResults([]);
                return;
            }
            const filtered = icdData.filter(item => 
                item.code.toLowerCase().includes(query.toLowerCase()) || 
                item.description.toLowerCase().includes(query.toLowerCase())
            );
            displayResults(filtered);
        }

        searchInput.addEventListener('input', (e) => {
            search(e.target.value);
        });

        // Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('SW registered: ', registration);
                    })
                    .catch(registrationError => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }
